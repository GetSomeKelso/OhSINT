# OSINT Orchestrator — Scan Profiles

passive:
  description: "Passive recon only — zero interaction with target infrastructure"
  tools:
    - theharvester:
        sources: "google,bing,linkedin,dnsdumpster"
    - shodan:
        mode: "search"
    - metagoofil:
        filetypes: "pdf,doc,xls,ppt,docx,xlsx,pptx"
        max_results: 100
    - github_dorks:
        mode: "org_scan"
    - exiftool:
        mode: "post_metagoofil"
    - spiderfoot:
        use_case: "passive"
    - dork_cli:
        dorks: "ghdb_passive"
    - brave_search:
        queries: "all"
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "both"

active:
  description: "Active recon — direct interaction with target (requires explicit auth)"
  inherits: passive
  tools:
    - spiderfoot:
        use_case: "all"
    - recon_ng:
        modules: "active_set"
    - xray:
        mode: "full"
    - linkedin2username:
        depth: 5
        sleep: 3

metadata:
  description: "Document and metadata focused recon"
  tools:
    - metagoofil:
        filetypes: "pdf,doc,xls,ppt,docx,xlsx,pptx,odp,ods"
        max_results: 200
    - exiftool:
        mode: "post_metagoofil"
    - dork_cli:
        dorks: "filetype_dorks"
    - brave_search:
        queries: "documents"
    - inspy:
        mode: "techspy"

social:
  description: "People and social media focused recon"
  tools:
    - theharvester:
        sources: "linkedin,google,bing"
    - spiderfoot:
        use_case: "investigate"
        target_type: "person_name"
    - creepy:
        mode: "social"
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "empspy"
    - sherlock:
        batch: true
        csv: true

people:
  description: "People and employee reconnaissance — LinkedIn enumeration, username discovery, social profile mapping"
  tools:
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "both"
    - linkedin2username:
        depth: 5
        sleep: 3
    - sherlock:
        batch: true
        csv: true
    - theharvester:
        sources: "linkedin,google,bing"

full:
  description: "All tools, all modules — comprehensive recon"
  inherits: active
  tools:
    - datasploit:
        mode: "full"
    - snitch:
        mode: "full"
    - vcsmap:
        mode: "full"
    - creepy:
        mode: "social"
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "both"
    - sherlock:
        batch: true
        csv: true
    - linkedint:
        mode: "full"
