# OhSINT — Scan Profiles

standard:
  description: "Standard recon — core passive tools for quick results"
  tools:
    - subfinder:
        all_sources: true
    - crtsh:
        wildcard: true
    - whois
    - theharvester:
        sources: "google,bing,linkedin,dnsdumpster"
    - shodan:
        mode: "search"
    - metagoofil:
        filetypes: "pdf,doc,xls,ppt,docx,xlsx,pptx"
        max_results: 100
    - github_dorks:
        mode: "org_scan"
    - exiftool:
        mode: "post_metagoofil"
    - dork_cli:
        dorks: "ghdb_passive"
    - brave_search:
        queries: "all"
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "both"
    - virustotal
    - h8mail
    - waymore:
        mode: "U"

passive:
  description: "All 23 passive tools — comprehensive passive recon, zero target interaction"
  inherits: standard
  tools:
    - spiderfoot:
        use_case: "passive"
    - sherlock:
        batch: true
        csv: true
    - maigret
    - holehe
    - goodork
    - datasploit:
        mode: "full"
    - snitch:
        mode: "full"
    - vcsmap:
        mode: "full"
    - creepy:
        mode: "social"

active:
  description: "Active recon only — direct interaction with target (requires explicit auth)"
  tools:
    - spiderfoot:
        use_case: "all"
    - recon_ng:
        modules: "active_set"
    - xray:
        mode: "full"
    - linkedin2username:
        depth: 5
        sleep: 3
    - linkedint:
        mode: "full"

full:
  description: "All 28 tools — passive + active combined"
  inherits: passive
  tools:
    - spiderfoot:
        use_case: "all"
    - recon_ng:
        modules: "active_set"
    - xray:
        mode: "full"
    - linkedin2username:
        depth: 5
        sleep: 3
    - linkedint:
        mode: "full"

phone:
  description: "Phone number recon — validation, carrier, threat intel (cheapest first)"
  tools:
    - numverify
    - twilio_lookup
    - intelx
    - hudson_rock
    - consumer_identity_reference

identity:
  description: "Identity recon — threat intel, phone, breach, platform check"
  tools:
    - intelx
    - hudson_rock
    - numverify
    - twilio_lookup
    - consumer_identity_reference
    - holehe
    - h8mail

commercial_identity:
  description: "FCRA-gated commercial identity — requires --authorization AND --fcra-permissible-purpose"
  tools:
    - whitepages_pro
    - beenverified

infrastructure:
  description: "Passive domain and infrastructure intelligence — subdomains, certificates, WHOIS, DNS"
  tools:
    - subfinder:
        all_sources: true
    - crtsh:
        wildcard: true
    - whois
    - theharvester:
        sources: "google,bing,dnsdumpster"
    - shodan:
        mode: "search"
    - brave_search:
        queries: "subdomains"

threat-intel:
  description: "Threat intelligence and breach exposure — reputation, breaches, archived attack surface"
  tools:
    - virustotal
    - h8mail
    - waymore:
        mode: "U"
    - shodan:
        mode: "search"

metadata:
  description: "Document and metadata focused recon"
  tools:
    - metagoofil:
        filetypes: "pdf,doc,xls,ppt,docx,xlsx,pptx,odp,ods"
        max_results: 200
    - exiftool:
        mode: "post_metagoofil"
    - dork_cli:
        dorks: "filetype_dorks"
    - brave_search:
        queries: "documents"
    - inspy:
        mode: "techspy"

social:
  description: "People and social media focused recon"
  tools:
    - theharvester:
        sources: "linkedin,google,bing"
    - spiderfoot:
        use_case: "investigate"
        target_type: "person_name"
    - creepy:
        mode: "social"
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "empspy"
    - sherlock:
        batch: true
        csv: true
    - maigret
    - holehe

people:
  description: "People and employee reconnaissance — LinkedIn enumeration, username discovery, social profile mapping"
  tools:
    - crosslinked:
        email_format: "{first}.{last}@{domain}"
    - inspy:
        mode: "both"
    - sherlock:
        batch: true
        csv: true
    - maigret
    - holehe
    - theharvester:
        sources: "linkedin,google,bing"
